<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Physics Engine</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <canvas id="canvas"></canvas>

    <div id="overlay">
        <span>Gravity: <span id="gravityDisplay">9.81</span></span>
        <span>FPS: <span id="fpsValue">60</span></span>

    </div>
    <div id="button-overlay">
        <button id="resetButton">Reset</button>
    </div>

    <div id="controls">
        <div class="control-group">
            <label for="radiusSlider">Radius: <span id="radiusValue">25</span></label>
            <input type="range" id="radiusSlider" min="8" max="60" value="25">
        </div>
        <div class="control-group">
            <label for="bouncinessSlider">Bounciness: <span id="bouncinessValue">0.65</span></label>
            <input type="range" id="bouncinessSlider" min="0" max="0.99" step="0.01" value="0.65">
        </div>
        <div class="control-group">
            <label for="airResistanceSlider">Air Resistance: <span id="airResistanceValue">1.225</span></label>
            <input type="range" id="airResistanceSlider" min="0" max="5" step="0.025" value="1.225">
        </div>
        <div class="control-group">
            <label for="frictionSlider">Friction: <span id="frictionValue">2</span></label>
            <input type="range" id="frictionSlider" min="0" max="10" step="1" value="2">
        </div>
        <div class="control-group">
            <label for="massSlider">Mass: <span id="massValue">25</span></label>
            <input type="range" id="massSlider" min="1" max="100" value="25">
        </div>
        <div class="control-group">
            <label for="timeScaleSlider">Time Scale: <span id="timeScaleValue">1</span></label>
            <input type="range" id="timeScaleSlider" min="0" max="2" step="0.1" value="1">
            <button id="resetTimeScale">Reset</button>
        </div>
        <div class="control-group">
            <label>Mode:</label>
            <button id="spawnMode">Spawn</button>
            <button id="pushMode">Push</button>

        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
