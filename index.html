<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Physics Engine</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <canvas id="canvas"></canvas>

    <div id="overlay">
        <div class="hud-title">PHYSICS ENGINE <span class="hud-title-sub">// Jake Jacobi</span></div>
        <div class="hud-row"><span class="hud-key">GRAVITY </span><span class="hud-val" id="gravityDisplay">9.81</span></div>
        <div class="hud-row"><span class="hud-key">FPS </span><span class="hud-val" id="fpsValue">60</span></div>
        </div>
    <div id="button-overlay">
        <button id="resetButton"><span aria-hidden="true">&#8635;</span> Reset</button>    </div>

    <div id="controls">
        <div class="control-group">
        <label for="radiusSlider">Radius <span class="unit">px</span><span class="value-readout" id="radiusValue">25</span></label>
            <input type="range" id="radiusSlider" min="8" max="60" value="25">
        </div>
        <div class="control-group">
            <label for="bouncinessSlider">Bounciness <span class="unit">e</span><span class="value-readout" id="bouncinessValue">0.65</span></label>
            <input type="range" id="bouncinessSlider" min="0" max="0.99" step="0.01" value="0.65">
        </div>
        <div class="control-group">
            <label for="airResistanceSlider">Air Resistance <span class="unit">ρ</span><span class="value-readout" id="airResistanceValue">1.225</span></label>
            <input type="range" id="airResistanceSlider" min="0" max="5" step="0.02" value="1.22">
        </div>
        <div class="control-group">
            <label for="frictionSlider">Friction <span class="unit">μ</span><span class="value-readout" id="frictionValue">2</span></label>
            <input type="range" id="frictionSlider" min="0" max="10" step="1" value="2">
        </div>
        <div class="control-group">
            <label for="massSlider">Mass <span class="unit">kg</span><span class="value-readout" id="massValue">25</span></label>
            <input type="range" id="massSlider" min="1" max="100" value="25">
        </div>
        <div class="control-group">
            <label for="timeScaleSlider">Time Scale <span class="unit">×</span><span class="value-readout" id="timeScaleValue">1</span></label>
            <input type="range" id="timeScaleSlider" min="0" max="2" step="0.1" value="1">
            <button id="resetTimeScale">Reset</button>
        </div>
        <div class="control-group">
            <label>Mode:</label>
            <button id="spawnMode">Spawn</button>
            <button id="pushMode">Push</button>

        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
